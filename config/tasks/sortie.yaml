entry_flow:
  - page: home
    action: sortie
    wait_ms: 800
  - page: sortie_menu
    action: sortie_start
    wait_ms: 800
  - page: map_select_1
    action_from_map: true
    wait_ms: 800
  - page: sortie_confirm
    action: decide
    wait_ms: 1200

map_actions:
  "1-1": { page: map_select_1, action: map_1_1 }
  "1-2": { page: map_select_1, action: map_1_2 }
  "1-3": { page: map_select_1, action: map_1_3 }
  "1-4": { page: map_select_1, action: map_1_4 }
  "1-5": { page: map_select_1, action: map_1_5 }

loop_pages:
  sortie_start:
    action: start
    wait_ms: 5000
  compass:
    action: spin
    wait_ms: 15000
  formation:
    action_type: choose_formation
    count_battle: true
    wait_ms: 1200
  battle:
    action_type: collect_damage
    click: false
    poll_ms: 500
    transition_wait_ms: 3000
  night_battle:
    action: enter
    wait_ms: 20000
  battle_result:
    action_type: click_anywhere
    action: continue
    wait_ms: 5000
  exp_gain:
    action_type: click_anywhere
    action: continue
    wait_ms: 4000
  new_ship:
    action_type: click_anywhere
    action: continue
    wait_ms: 5000
  resource_node:
    action_type: click_anywhere
    action: continue
    wait_ms: 1000
  advance_or_retreat:
    action_type: advance_or_retreat
    wait_ms: 1000
  return_home:
    action_type: finish

damage_detection:
  retreat_on:
    - heavy
  states:
    heavy:
      template: "sortie/damage/heavy.png"
      threshold: 0.88
      region: { x: 470, y: 215, width: 80, height: 475 }
    moderate:
      template: "sortie/damage/moderate.png"
      threshold: 0.88
      region: { x: 470, y: 215, width: 80, height: 475 }
    minor:
      template: "sortie/damage/minor.png"
      threshold: 0.88
      region: { x: 470, y: 215, width: 80, height: 475 }

hp_ocr:
  enabled: true
  region: { x: 250, y: 126, width: 90, height: 374 }
  padding: { top: 8, right: 4, bottom: 4, left: 4 }
  scale: 2
  max_rows: 6

default_click:
  name: "继续"
  x: 820
  y: 680
