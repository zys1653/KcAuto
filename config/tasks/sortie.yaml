initial_state: "home"

formation_points:
  line_ahead: { x: 604, y: 312, name: "单纵阵" }
  double_line: { x: 604, y: 374, name: "复纵阵" }
  diamond: { x: 604, y: 436, name: "轮形阵" }
  echelon: { x: 604, y: 498, name: "梯形阵" }
  line_abreast: { x: 604, y: 560, name: "单横阵" }

states:
  home:
    detect:
      type: "always"
    actions:
      - type: "log"
        message: "示例状态：主页。请把 sortie_entry 坐标改成真实出击入口。"
      - type: "click"
        point: "sortie_entry"
      - type: "wait"
        ms: 800
    next: "map_select"
    timeout_ms: 5000
    on_fail: "stop"

  map_select:
    detect:
      type: "always"
    actions:
      - type: "log"
        message: "示例状态：地图选择。请把 map_start 坐标改成真实出击按钮。"
      - type: "click"
        point: "map_start"
      - type: "wait"
        ms: 1000
    next: "formation"
    timeout_ms: 5000
    on_fail: "stop"

  formation:
    detect:
      type: "always"
    actions:
      - type: "log"
        message: "选择配置中的阵型。"
      - type: "formation"
      - type: "wait"
        ms: 1200
    next: "battle_wait"
    timeout_ms: 5000
    on_fail: "stop"

  battle_wait:
    detect:
      type: "always"
    actions:
      - type: "log"
        message: "战斗等待示例。真实流程中应替换为结果页模板检测。"
      - type: "wait"
        ms: 1500
    next: "damage_check"
    timeout_ms: 30000
    on_fail: "stop"

  damage_check:
    detect:
      type: "always"
    actions:
      - type: "damage_check"
      - type: "log"
        message: "血量控制入口已预留。补齐模板后可在这里撤退或停止。"
    next: "result"
    timeout_ms: 5000
    on_fail: "stop"

  result:
    detect:
      type: "always"
    actions:
      - type: "log"
        message: "出击轮次完成。示例规则会停止，避免误点。"
      - type: "stop"
    next: null
    timeout_ms: 5000
    on_fail: "stop"

points:
  sortie_entry: { x: 1040, y: 520, name: "出击入口示例" }
  map_start: { x: 1020, y: 650, name: "出击开始示例" }
  retreat: { x: 410, y: 600, name: "撤退示例" }
  proceed: { x: 790, y: 600, name: "进击示例" }

damage_rules:
  heavy_damage:
    detect:
      type: "template"
      template: "sortie/damage/heavy.png"
      threshold: 0.88
    action: "stop"
  medium_damage:
    detect:
      type: "template"
      template: "sortie/damage/medium.png"
      threshold: 0.88
    action: "retreat"

